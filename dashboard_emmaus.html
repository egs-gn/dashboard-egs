<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Emmaüs Grand Sud</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F0F2F8; min-height: 100vh; padding: 0; }
.dash { max-width: 1100px; margin: 0 auto; background: #F0F2F8; padding-bottom: 20px; }
.dash-top { background: #1A2B5E; padding: 16px 28px 0; border-radius: 12px; margin: 20px 28px 0; }
.dash-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.dash-brand-name { font-size: 22px; font-weight: 500; color: #fff; }
.dash-brand-sub { font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 4px; }
.dash-ts { margin-left: auto; font-size: 11px; color: rgba(255,255,255,0.4); display: flex; align-items: center; gap: 5px; }
.refresh-btn { background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); font-size: 11px; padding: 4px 10px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 4px; margin-left: 10px; }
.refresh-btn:hover { background: rgba(255,255,255,0.15); }
.dash-tabs { display: flex; gap: 0; padding-left: 92px; }
.dash-tab { font-size: 13px; padding: 11px 20px; color: rgba(255,255,255,0.45); border-bottom: 2px solid transparent; cursor: pointer; display: flex; align-items: center; gap: 6px; background: none; border-left: none; border-right: none; border-top: none; font-family: inherit; }
.dash-tab.active { color: #fff; border-bottom: 2px solid #F5C842; font-weight: 500; }
.dash-body { padding: 16px 28px 28px; }
.section-label { font-size: 10px; font-weight: 600; color: #64748B; text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 10px; }
.hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.hero-card { background: #fff; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.07); overflow: hidden; display: flex; flex-direction: column; }
.hero-card-inner { padding: 16px 18px 16px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
.hero-card-label { font-size: 10px; font-weight: 600; color: #64748B; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.hero-card-value { font-size: 30px; font-weight: 500; color: #0F172A; line-height: 1; }
.hero-card-sub { font-size: 11px; color: #64748B; margin-top: 6px; display: flex; align-items: center; gap: 6px; }
.hero-card-bar { height: 3px; background: #EEF0F6; }
.hero-card-bar-fill { height: 3px; border-radius: 0 2px 2px 0; transition: width 0.6s; }
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.card { background: #fff; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.07); padding: 16px 18px; }
.card-title { font-size: 13px; font-weight: 500; color: #0F172A; margin-bottom: 2px; }
.card-ct { font-size: 11px; color: #64748B; margin-bottom: 14px; }
.pie-wrap { display: flex; align-items: center; gap: 14px; }
.pie-leg { display: flex; flex-direction: column; gap: 8px; flex: 1; }
.pie-leg-item { display: flex; align-items: center; gap: 7px; }
.pie-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.pie-leg-name { font-size: 11px; color: #0F172A; flex: 1; }
.pie-leg-bar-wrap { width: 50px; background: #EEF0F6; border-radius: 3px; height: 4px; overflow: hidden; }
.pie-leg-bar { height: 4px; border-radius: 3px; }
.pie-leg-pct { font-size: 10px; font-weight: 600; color: #64748B; min-width: 28px; text-align: right; }
.truck-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 16px; }
.truck-card { background: #fff; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.07); padding: 14px 10px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
.truck-ic { width: 40px; height: 40px; border-radius: 10px; background: #EEF2FF; display: flex; align-items: center; justify-content: center; margin-bottom: 3px; }
.truck-ic i { font-size: 20px; color: #2A3E8F; }
.truck-vname { font-size: 11px; font-weight: 500; color: #0F172A; text-align: center; }
.truck-plate { font-size: 9px; color: #64748B; background: #F1F5F9; border-radius: 3px; padding: 1px 7px; letter-spacing: 0.7px; }
.truck-km { font-size: 20px; font-weight: 500; color: #1A2B5E; margin-top: 2px; }
.truck-lbl { font-size: 9px; color: #94A3B8; }
.inc-card { background: #FFFBEB; border: 0.5px solid #FDE68A; border-radius: 12px; overflow: hidden; }
.inc-head { padding: 11px 16px; display: flex; align-items: center; gap: 7px; border-bottom: 0.5px solid #FDE68A; }
.inc-head-txt { font-size: 12px; font-weight: 500; color: #92400E; }
.inc-row { padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
.inc-meta { font-size: 10px; color: #92400E; font-weight: 500; margin-bottom: 2px; }
.inc-desc { font-size: 12px; color: #0F172A; }
.inc-badge { background: #FEF3C7; color: #92400E; font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 5px; white-space: nowrap; }
.inc-link { font-size: 11px; color: #2A3E8F; text-decoration: none; white-space: nowrap; }
.inc-link:hover { text-decoration: underline; }
.podium-wrap { display: flex; align-items: flex-end; justify-content: center; gap: 10px; padding: 8px 0 0; }
.podium-col { display: flex; flex-direction: column; align-items: center; gap: 2px; justify-content: flex-end; }
.podium-bar { border-radius: 4px 4px 0 0; }
.podium-name { font-size: 10px; font-weight: 500; color: #0F172A; }
.podium-count { font-size: 9px; color: #64748B; }
.plate-badge { background: #EEF2FF; color: #2A3E8F; font-size: 10px; font-weight: 500; padding: 1px 8px; border-radius: 4px; letter-spacing: 0.5px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.inv-card { background: #fff; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.07); padding: 16px 18px; margin-bottom: 12px; }
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; font-size: 12px; }
.bar-size { min-width: 32px; color: #64748B; font-size: 11px; }
.bar-bg { flex: 1; background: #EEF0F6; border-radius: 4px; height: 8px; overflow: hidden; }
.bar-fill { height: 8px; border-radius: 4px; transition: width 0.4s; }
.bar-qty { min-width: 22px; font-weight: 500; color: #0F172A; font-size: 12px; text-align: right; }
.badge { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 5px; font-weight: 500; }
.loading { display: flex; align-items: center; justify-content: center; padding: 3rem; color: #64748B; font-size: 14px; gap: 10px; }
.spinner { width: 18px; height: 18px; border: 2px solid #ddd; border-top-color: #1A2B5E; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-box { background: #FCEBEB; color: #A32D2D; border-radius: 8px; padding: 14px; font-size: 13px; margin-bottom: 1rem; }
@media (max-width: 700px) { .hero-row, .charts-row { grid-template-columns: 1fr; } .truck-row { grid-template-columns: 1fr 1fr; } .dash-body { padding: 16px; } }
</style>
</head>

#login-overlay {
  position: fixed; inset: 0; background: #F0F2F8;
  display: flex; align-items: center; justify-content: center;
  z-index: 9999; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.login-card {
  background: #fff; border-radius: 16px; border: 0.5px solid rgba(0,0,0,0.08);
  padding: 40px 36px; width: 100%; max-width: 380px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
.login-logo { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 28px; }

.login-logo-name { font-size: 18px; font-weight: 500; color: #1A2B5E; }
.login-logo-sub { font-size: 12px; color: #64748B; margin-top: -8px; }
.login-label { font-size: 11px; font-weight: 600; color: #64748B; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; display: block; }
.login-input { width: 100%; height: 42px; border: 1px solid #E2E8F0; border-radius: 8px; padding: 0 12px; font-size: 14px; font-family: inherit; outline: none; color: #0F172A; background: #F8FAFC; margin-bottom: 16px; }
.login-input:focus { border-color: #1A2B5E; background: #fff; }
.login-btn { width: 100%; height: 44px; background: #1A2B5E; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; margin-top: 4px; }
.login-btn:hover { background: #2A3E8F; }
.login-error { font-size: 12px; color: #E24B4A; background: #FCEBEB; border-radius: 6px; padding: 8px 12px; margin-bottom: 14px; display: none; }

<script>
function doLogin() {
  const id = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value;
  if (id === 'admin' && pw === '@EmmausGrandSud') {
    document.getElementById('login-overlay').style.display = 'none';
    sessionStorage.setItem('auth', '1');
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
document.getElementById('login-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
if (sessionStorage.getItem('auth') === '1') {
  document.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('login-overlay');
    if (el) el.style.display = 'none';
  });
}
</script>

const VEH_COLORS = ['#F5C842','#2A3E8F','#7B9FE0','#CBD5E1','#4C6BC4','#B8CFF5'];
let charts = {};

function switchTab(name) {
  document.querySelectorAll('.dash-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('btn-' + name).classList.add('active');
}

async function fetchSheet(id, range) {
  const url = 'https://sheets.googleapis.com/v4/spreadsheets/' + id + '/values/' + encodeURIComponent(range) + '?key=' + API_KEY;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Erreur API Google Sheets (code ' + res.status + ')');
  const data = await res.json();
  return data.values || [];
}

function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }
function makeChart(id, config) { destroyChart(id); const ctx = document.getElementById(id); if (ctx) charts[id] = new Chart(ctx, config); }

async function loadFlotte() {
  document.getElementById('flotte-loading').style.display = 'flex';
  document.getElementById('flotte-content').style.display = 'none';
  document.getElementById('flotte-error').style.display = 'none';
  try {
    const rows = await fetchSheet(SHEET_FLOTTE, 'A:O');
    if (rows.length < 2) throw new Error('Données insuffisantes.');
    const data = rows.slice(1).filter(r => r[0] && r[1]);

    const iDate=0, iChauffeur=1, iVehicule=2, iMoment=3, iKm=4;
    const iLiquides=7, iFeux=9, iDommage=10, iDesc=11, iPhoto=12;

    const chauffeurs = {}, vehicules = {}, kmParJourVehicule = {}, incidents = [];
    const departsKm = {};

    data.forEach(r => {
      const chauffeur = r[iChauffeur] || '';
      const vehicule = (r[iVehicule] || '').trim();
      const moment = (r[iMoment] || '').toLowerCase();
      const km = parseFloat(r[iKm]) || 0;
      const date = (r[iDate] || '').split(' ')[0];
      const key = vehicule + '|' + date;

      if (moment.includes('départ')) {
        chauffeurs[chauffeur] = (chauffeurs[chauffeur] || 0) + 1;
        vehicules[vehicule] = (vehicules[vehicule] || 0) + 1;
        departsKm[key] = km;
      }
      if (moment.includes('retour') && departsKm[key] !== undefined) {
        const diff = km - departsKm[key];
        if (diff > 0) {
          if (!kmParJourVehicule[date]) kmParJourVehicule[date] = {};
          kmParJourVehicule[date][vehicule] = (kmParJourVehicule[date][vehicule] || 0) + diff;
        }
      }
      const nouveauDommage = !!(r[iDesc] && r[iDesc].trim() !== '');
      const problLiquide = !!(r[iLiquides] && r[iLiquides].trim() !== '');
      const problFeux = !!(r[iFeux] && r[iFeux].trim() !== '');
      if (nouveauDommage || problLiquide || problFeux) {
        let types = [];
        if (nouveauDommage) types.push('Dommage carrosserie');
        if (problLiquide) types.push('Liquide');
        if (problFeux) types.push('Feux');
        incidents.push({ date, chauffeur, vehicule, desc: r[iDesc] || 'Non précisé', types, photo: nouveauDommage && r[iPhoto] ? r[iPhoto] : null });
      }
    });

    const totalSorties = Object.values(chauffeurs).reduce((a,b) => a+b, 0);
    const chauffeurLabels = Object.keys(chauffeurs);
    const vehiculeLabels = Object.keys(vehicules);

    // Véhicule le plus utilisé
    const topVehicule = vehiculeLabels.reduce((a,b) => vehicules[a] >= vehicules[b] ? a : b, vehiculeLabels[0] || '');
    const topVehiculeCount = vehicules[topVehicule] || 0;
    const topVehiculeMatch = topVehicule.match(/^(.+?)\s*\[(.+?)\]/);
    const topVName = topVehiculeMatch ? topVehiculeMatch[1].trim() : topVehicule;
    const topVPlate = topVehiculeMatch ? topVehiculeMatch[2].trim() : '';
    const topVPct = totalSorties > 0 ? Math.round(topVehiculeCount / totalSorties * 100) : 0;

    // Top 3
    const top3 = [...chauffeurLabels].sort((a,b) => chauffeurs[b]-chauffeurs[a]).slice(0,3);
    // Podium : on définit les 3 slots dans l'ordre visuel gauche→droite
    // slot 0 = gauche (2e place), slot 1 = centre (1er), slot 2 = droite (3e)
    const podiumSlots = [
      { rank: 1, medal: '🥈', height: '44px', color: '#CBD5E1', width: '40px', fs: '15px', fw: '500', fsize: '10px' },
      { rank: 0, medal: '🥇', height: '72px', color: '#F5C842', width: '52px', fs: '20px', fw: '600', fsize: '12px' },
      { rank: 2, medal: '🥉', height: '30px', color: '#D4A27A', width: '40px', fs: '13px', fw: '500', fsize: '10px' }
    ];
    const podiumHTML = '<div class="podium-wrap">' +
      podiumSlots.map(s => {
        if (!top3[s.rank]) return '';
        const n = top3[s.rank].split(' ')[0];
        return '<div class="podium-col" style="justify-content:flex-end;">' +
          '<div style="font-size:' + s.fs + ';margin-bottom:2px;">' + s.medal + '</div>' +
          '<div class="podium-name" style="font-size:' + s.fsize + ';font-weight:' + s.fw + ';">' + n + '</div>' +
          '<div class="podium-count" style="margin-bottom:4px;">' + chauffeurs[top3[s.rank]] + ' EDL</div>' +
          '<div class="podium-bar" style="height:' + s.height + ';background:' + s.color + ';width:' + s.width + ';flex-shrink:0;"></div>' +
        '</div>';
      }).join('') +
    '</div>';

    // Km semaine
    const now = new Date();
    const dow = now.getDay() === 0 ? 6 : now.getDay() - 1;
    const monday = new Date(now); monday.setDate(now.getDate() - dow); monday.setHours(0,0,0,0);
    const allDates = [...new Set(data.map(r => (r[iDate]||'').split(' ')[0]).filter(Boolean))].sort();
    const kmSemaine = {};
    vehiculeLabels.forEach(v => {
      kmSemaine[v] = 0;
      allDates.forEach(d => {
        const p = d.split('/');
        if (p.length === 3) {
          const dt = new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
          if (dt >= monday && kmParJourVehicule[d] && kmParJourVehicule[d][v]) {
            kmSemaine[v] += kmParJourVehicule[d][v];
          }
        }
      });
    });

    // Legends
    const chauffeurPieColors = NAVY.slice(0, chauffeurLabels.length);
    const vehiculePieColors = VEH_COLORS.slice(0, vehiculeLabels.length);

    const legChauffeur = chauffeurLabels.map((l,i) => {
      const pct = Math.round(chauffeurs[l]/totalSorties*100);
      return '<div class="pie-leg-item"><span class="pie-dot" style="background:' + chauffeurPieColors[i] + ';"></span><span class="pie-leg-name">' + l + '</span><div class="pie-leg-bar-wrap"><div class="pie-leg-bar" style="width:' + (pct*100/29) + '%;background:' + chauffeurPieColors[i] + ';"></div></div><span class="pie-leg-pct">' + pct + '%</span></div>';
    }).join('');

    const legVehicule = vehiculeLabels.map((l,i) => {
      const pct = Math.round(vehicules[l]/totalSorties*100);
      const nm = l.replace(/\s*\[.*?\]/, '');
      return '<div class="pie-leg-item"><span class="pie-dot" style="background:' + vehiculePieColors[i] + ';"></span><span class="pie-leg-name">' + nm + '</span><div class="pie-leg-bar-wrap"><div class="pie-leg-bar" style="width:' + pct + '%;background:' + vehiculePieColors[i] + ';"></div></div><span class="pie-leg-pct">' + pct + '%</span></div>';
    }).join('');

    const truckCardsHTML = vehiculeLabels.map(v => {
      const km = Math.round(kmSemaine[v] || 0);
      const m = v.match(/^(.+?)\s*\[(.+?)\]/);
      const vn = m ? m[1].trim() : v;
      const vp = m ? m[2].trim() : '';
      const inactive = km === 0;
      return '<div class="truck-card">' +
        '<div class="truck-ic" style="' + (inactive ? 'background:#F8FAFC;' : '') + '"><i class="ti ti-truck" style="' + (inactive ? 'color:#CBD5E1;' : '') + '"></i></div>' +
        '<div class="truck-vname" style="' + (inactive ? 'color:#94A3B8;' : '') + '">' + vn + '</div>' +
        (vp ? '<div class="truck-plate">' + vp + '</div>' : '') +
        '<div class="truck-km" style="' + (inactive ? 'color:#CBD5E1;' : '') + '">' + km + ' km</div>' +
        '<div class="truck-lbl">' + (inactive ? 'aucune sortie' : 'cette semaine') + '</div>' +
      '</div>';
    }).join('');

    const incidentsHTML = incidents.length
      ? incidents.map(inc => {
          const badges = inc.types.map(t => '<span class="inc-badge">' + t + '</span>').join(' ');
          const photo = inc.photo ? '<a class="inc-link" href="' + inc.photo + '" target="_blank"><i class="ti ti-camera" style="font-size:12px;"></i> Voir photo</a>' : '';
          const vShort = inc.vehicule.replace(/\s*\[.*?\]/, '');
          const vPlate = (inc.vehicule.match(/\[(.+?)\]/) || [])[1] || '';
          return '<div class="inc-row">' +
            '<div style="width:3px;height:36px;background:#F59E0B;border-radius:2px;flex-shrink:0;"></div>' +
            '<div style="flex:1;">' +
              '<div class="inc-meta">' + inc.date + ' · ' + inc.chauffeur + ' · ' + vShort + (vPlate ? ' [' + vPlate + ']' : '') + '</div>' +
              '<div class="inc-desc">' + inc.desc + '</div>' +
            '</div>' +
            badges + photo +
          '</div>';
        }).join('')
      : '<div class="inc-row" style="color:#64748B;font-size:12px;">Aucun incident signalé</div>';

    document.getElementById('flotte-content').innerHTML =
      '<div class="section-label">Vue d\'ensemble</div>' +
      '<div class="hero-row">' +
        '<div class="hero-card" style="overflow:hidden;display:flex;flex-direction:column;"><div class="hero-card-inner" style="flex:1;">' +
          '<div class="hero-card-label"><i class="ti ti-steering-wheel" style="font-size:13px;color:#2A3E8F;"></i> Véhicule le plus utilisé</div>' +
          '<div style="display:flex;align-items:center;gap:14px;margin-top:10px;">' +
            '<div style="width:52px;height:52px;border-radius:12px;background:#EEF2FF;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' +
              '<i class="ti ti-truck" style="font-size:26px;color:#1A2B5E;"></i>' +
            '</div>' +
            '<div style="flex:1;">' +
              '<div style="font-size:18px;font-weight:500;color:#0F172A;line-height:1.2;">' + topVName + '</div>' +
              '<div style="margin-top:5px;"><span class="plate-badge">' + topVPlate + '</span></div>' +
            '</div>' +
          '</div>' +
          '<div style="margin-top:12px;background:#EEF0F6;border-radius:6px;overflow:hidden;height:6px;">' +
            '<div style="width:' + topVPct + '%;height:6px;background:#1A2B5E;border-radius:6px;"></div>' +
          '</div>' +
          '<div style="text-align:center;margin-top:5px;font-size:13px;font-weight:500;color:#1A2B5E;">' + topVPct + '% des EDL</div>' +
        '</div></div>' +

        '<div class="hero-card"><div class="hero-card-inner">' +
          '<div class="hero-card-label"><i class="ti ti-trophy" style="font-size:13px;color:#B45309;"></i> Top chauffeurs</div>' +
          podiumHTML +
        '</div><div class="hero-card-bar"><div class="hero-card-bar-fill" style="width:100%;background:#F5C842;"></div></div></div>' +

        (incidents.length > 0 ?
          '<div class="hero-card" style="background:#FFF8F8;border:0.5px solid #FBBFBF;display:flex;flex-direction:column;"><div class="hero-card-inner" style="flex:1;display:flex;flex-direction:column;">' +
            '<div class="hero-card-label" style="color:#A32D2D;"><i class="ti ti-alert-triangle" style="font-size:13px;"></i> Incidents signalés</div>' +
            '<div style="display:flex;align-items:center;gap:14px;margin-bottom:12px;margin-top:4px;">' +
              '<div style="width:52px;height:52px;border-radius:12px;background:#FCEBEB;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' +
                '<i class="ti ti-alert-triangle" style="font-size:26px;color:#E24B4A;"></i>' +
              '</div>' +
              '<div style="flex:1;">' +
                '<div style="font-size:32px;font-weight:500;color:#E24B4A;line-height:1;">' + incidents.length + '</div>' +
                '<div style="font-size:11px;color:#A32D2D;margin-top:3px;">incident' + (incidents.length > 1 ? 's' : '') + ' cette semaine</div>' +
              '</div>' +
            '</div>' +
            incidents.map(inc => {
              const vShort = inc.vehicule.replace(/\s*\[.*?\]/, "");
              const vPlate = (inc.vehicule.match(/\[(.+?)\]/) || [])[1] || "";
              const photo = inc.photo ? " <a href=\"" + inc.photo + "\" target=\"_blank\" style=\"margin-left:auto;font-size:11px;color:#A32D2D;text-decoration:none;display:flex;align-items:center;gap:3px;flex-shrink:0;\"><i class=\"ti ti-camera\" style=\"font-size:13px;\"></i> Photo</a>" : "";
              return '<div style="background:#FCEBEB;border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:6px;">' +
                '<div style="width:3px;height:32px;background:#E24B4A;border-radius:2px;flex-shrink:0;"></div>' +
                '<div style="flex:1;">' +
                  '<div style="font-size:10px;font-weight:600;color:#A32D2D;margin-bottom:2px;">' + inc.date + " · " + inc.chauffeur + " · " + vShort + (vPlate ? " [" + vPlate + "]" : "") + '</div>' +
                  '<div style="font-size:11px;color:#791F1F;">' + inc.desc + '</div>' +
                '</div>' + photo +
              '</div>';
            }).join('') +
          '</div></div>'
        :
          '<div class="hero-card" style="background:#F0FDF4;border:0.5px solid #BBF7D0;display:flex;flex-direction:column;"><div class="hero-card-inner" style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;">' +
            '<div style="width:52px;height:52px;border-radius:12px;background:#DCFCE7;display:flex;align-items:center;justify-content:center;margin-bottom:10px;">' +
              '<i class="ti ti-circle-check" style="font-size:26px;color:#22C55E;"></i>' +
            '</div>' +
            '<div style="font-size:14px;font-weight:500;color:#166534;">Aucun incident</div>' +
            '<div style="font-size:11px;color:#16A34A;margin-top:4px;">cette semaine</div>' +
          '</div></div>'
        ) +
      '</div>' +

      '<div class="section-label">Kilométrage de la semaine</div>' +
      '<div class="truck-row">' + truckCardsHTML + '</div>' +

      '<div class="section-label">Répartition des sorties</div>' +
      '<div class="charts-row">' +
        '<div class="card"><div class="card-title">Par chauffeur</div><div class="card-ct">' + totalSorties + ' sorties enregistrées</div><div class="pie-wrap"><div style="position:relative;width:110px;height:110px;flex-shrink:0;"><canvas id="chartChauffeur" role="img" aria-label="Sorties par chauffeur">Répartition par chauffeur.</canvas></div><div class="pie-leg">' + legChauffeur + '</div></div></div>' +
        '<div class="card"><div class="card-title">Par véhicule</div><div class="card-ct">' + totalSorties + ' sorties enregistrées</div><div class="pie-wrap"><div style="position:relative;width:110px;height:110px;flex-shrink:0;"><canvas id="chartVehicule" role="img" aria-label="Sorties par véhicule">Répartition par véhicule.</canvas></div><div class="pie-leg">' + legVehicule + '</div></div></div>' +
      '</div>' +

      '';

    document.getElementById('flotte-loading').style.display = 'none';
    document.getElementById('flotte-content').style.display = 'block';

    const pieOpts = {
      responsive: true, maintainAspectRatio: false, cutout: '62%',
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      elements: { arc: { borderWidth: 3, borderColor: '#fff' } }
    };
    makeChart('chartChauffeur', { type:'doughnut', data:{ datasets:[{ data: chauffeurLabels.map(l => chauffeurs[l]), backgroundColor: chauffeurPieColors, borderWidth: 3 }] }, options: pieOpts });
    makeChart('chartVehicule', { type:'doughnut', data:{ datasets:[{ data: vehiculeLabels.map(l => vehicules[l]), backgroundColor: vehiculePieColors, borderWidth: 3 }] }, options: pieOpts });

  } catch(e) {
    document.getElementById('flotte-loading').style.display = 'none';
    document.getElementById('flotte-error').textContent = 'Erreur : ' + e.message;
    document.getElementById('flotte-error').style.display = 'block';
  }
}

async function loadInventaire() {
  document.getElementById('inv-loading').style.display = 'flex';
  document.getElementById('inv-content').style.display = 'none';
  document.getElementById('inv-error').style.display = 'none';
  try {
    const rows = await fetchSheet(SHEET_INV, 'A:G');
    const dataRows = rows.filter(r => r[0] && !isNaN(parseFloat(r[0])));
    if (!dataRows.length) throw new Error('Données inventaire introuvables.');
    const inv = dataRows.map(r => ({ pointure: r[0], stock: parseInt(r[4]) || 0, seuil: parseInt(r[5]) || 0, statut: r[6] || '' }));
    const total = inv.reduce((a,b) => a+b.stock, 0);
    const ruptures = inv.filter(i => i.stock === 0).length;
    const alertes = inv.filter(i => i.stock > 0 && i.statut === 'ALERTE').length;
    const maxV = Math.max(...inv.map(i => i.stock), 1);

    const barsHTML = inv.map(i => {
      const pct = Math.round(i.stock / maxV * 100);
      const color = i.stock === 0 ? '#E24B4A' : i.statut === 'ALERTE' ? '#F59E0B' : '#2A3E8F';
      const badge = i.stock === 0
        ? '<span class="badge" style="background:#FCEBEB;color:#A32D2D;">Rupture</span>'
        : i.statut === 'ALERTE'
        ? '<span class="badge" style="background:#FEF3C7;color:#92400E;">Alerte</span>'
        : '<span class="badge" style="background:#EAF3DE;color:#3B6D11;">OK</span>';
      return '<div class="bar-row"><span class="bar-size">' + i.pointure + '</span><div class="bar-bg"><div class="bar-fill" style="width:' + pct + '%;background:' + color + ';"></div></div><span class="bar-qty">' + i.stock + '</span>' + badge + '</div>';
    }).join('');

    document.getElementById('inv-content').innerHTML =
      '<div class="section-label">Vue d\'ensemble</div>' +
      '<div class="hero-row" style="margin-bottom:20px;">' +
        '<div class="hero-card"><div class="hero-card-inner"><div class="hero-card-label">Total paires</div><div class="hero-card-value">' + total + '</div></div><div class="hero-card-bar"><div class="hero-card-bar-fill" style="width:100%;background:#2A3E8F;"></div></div></div>' +
        '<div class="hero-card"><div class="hero-card-inner"><div class="hero-card-label">Alertes stock faible</div><div class="hero-card-value" style="color:#B45309;">' + alertes + '</div></div><div class="hero-card-bar"><div class="hero-card-bar-fill" style="width:' + Math.round(alertes/inv.length*100) + '%;background:#F59E0B;"></div></div></div>' +
        '<div class="hero-card"><div class="hero-card-inner"><div class="hero-card-label">Ruptures de stock</div><div class="hero-card-value" style="color:#E24B4A;">' + ruptures + '</div></div><div class="hero-card-bar"><div class="hero-card-bar-fill" style="width:' + Math.round(ruptures/inv.length*100) + '%;background:#E24B4A;"></div></div></div>' +
      '</div>' +
      '<div class="section-label">Stock par pointure</div>' +
      '<div class="inv-card">' + barsHTML + '</div>';

    document.getElementById('inv-loading').style.display = 'none';
    document.getElementById('inv-content').style.display = 'block';
  } catch(e) {
    document.getElementById('inv-loading').style.display = 'none';
    document.getElementById('inv-error').textContent = 'Erreur : ' + e.message;
    document.getElementById('inv-error').style.display = 'block';
  }
}

async function loadAll() {
  document.getElementById('last-update').textContent = 'Actualisation...';
  await Promise.all([loadFlotte(), loadInventaire()]);
  const now = new Date();
  document.getElementById('last-update').textContent = now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
}

loadAll();
</script>
